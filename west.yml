manifest:
        remotes:
                - name: zephyrproject
                  url-base: https://github.com/zephyrproject-rtos
                - name: zephyr-book
                  url-base: https://github.com/zephyr-book
                - name: edgebr
                  url-base: https://github.com/edgebr

                # EDHOC (RFC 9528) engine -- replaces uoscore-uedhoc's buggy
                # EDHOC half (see docs/edhoc-oscore-plan.md). uoscore-uedhoc is
                # kept for OSCORE only.
                - name: kamil-kielbasa
                  url-base: https://github.com/kamil-kielbasa

                # X25519/Ed25519 for EDHOC cipher suite 0 (libedhoc's suite_0
                # helper depends on it). Same pin libedhoc uses.
                - name: davylandman
                  url-base: https://github.com/DavyLandman

        projects:
                - name: zephyr
                  remote: zephyrproject
                  revision: v4.4.0
                  clone-depth: 1
                  # path-prefix below also prepends to this project's own path,
                  # so `path: zephyr` resolves to deps/zephyr.
                  path: zephyr
                  import:
                          path-prefix: deps/
                          name-allowlist:
                                  - hal_rpi_pico
                                  - cmsis_6
                                  - fatfs
                                  - littlefs
                                  - mbedtls
                                  - tf-psa-crypto
                                  # EDHOC (RFC 9528) + OSCORE (RFC 8613) library
                                  # and its CBOR backend dependency.
                                  - uoscore-uedhoc
                                  - zcbor

                # libedhoc -- EDHOC (RFC 9528) responder engine, pure C, native
                # Zephyr module (ships zephyr/module.yml -> auto-discovered),
                # mbedTLS/PSA backend. Verified byte-exact against RFC 9529 ch.3
                # (our exact method-3/CCS/kid profile). Pinned to a release tag.
                - name: libedhoc
                  remote: kamil-kielbasa
                  revision: v1.14.1
                  path: deps/modules/lib/libedhoc

                # compact25519 -- small portable X25519/Ed25519, used by
                # libedhoc's cipher-suite-0 helper. Not a Zephyr module: its
                # sources are compiled by the app (see CMakeLists.txt).
                - name: compact25519
                  remote: davylandman
                  revision: v1.1.0
                  path: deps/modules/lib/compact25519

                # Board support shipped as a Zephyr module (provides boards/ via module.yml).
                - name: zbook
                  remote: zephyr-book
                  revision: main

                - name: oled-mono-fonts
                  remote: edgebr
                  revision: zephyr
                  path: deps/modules/fonts/oled-mono-fonts

                - name: oled-sh1106-zephyr
                  remote: edgebr
                  revision: 3-wire-spi
                  clone-depth: 1
                  path: deps/modules/drivers/display

        self:
                path: usb_ncm_net
