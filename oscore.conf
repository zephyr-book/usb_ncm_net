# usb_ncm_net -- EDHOC + OSCORE variant. Layer on top of prj.conf:
#   west build -p always -b zbook/rp2350b/m33 -- -DEXTRA_CONF_FILE=oscore.conf
#   (or: just build-oscore)
#
# Application-layer security over PLAIN CoAP/UDP :5683 (no DTLS):
#   - EDHOC (RFC 9528, method 3 static-DH, suite 0 X25519) establishes keys via
#     POSTs to /.well-known/edhoc (RFC 9668 transport binding).
#   - OSCORE (RFC 8613) protects the hello/led exchange.
# The peer (EDHOC Initiator + OSCORE client) is the host PC -- a TypeScript
# client using node-edhoc + node-coap-oscore (native bindings to the same
# libedhoc + uoscore-uedhoc this device runs). See scripts/ts-client/.
#
# Split-library design (see docs/edhoc-oscore-plan.md):
#   - EDHOC engine = libedhoc (RFC-9528-final, RFC-9529 byte-verified).
#     src/edhoc_oscore.c is compiled in when CONFIG_LIBEDHOC_ENABLE is set.
#   - OSCORE engine = uoscore-uedhoc's OSCORE half (kept; its EDHOC half has two
#     unfixed RFC-9528 encoding bugs and is no longer built -- CONFIG_UEDHOC off).
#
# SSN persistence is NOT enabled: a fresh EDHOC run each boot re-keys OSCORE, so
# the sender sequence number always starts from 0 (no AEAD nonce reuse).

# --- EDHOC engine: libedhoc (native Zephyr module) ---
CONFIG_LIBEDHOC_ENABLE=y
# Tune the compile-time working-set to our single profile (method 3, suite 0,
# one-byte connection ids and kids, no EAD). Smaller than the defaults.
CONFIG_LIBEDHOC_MAX_NR_OF_CIPHER_SUITES=1
CONFIG_LIBEDHOC_MAX_LEN_OF_CONN_ID=1
CONFIG_LIBEDHOC_MAX_LEN_OF_ECC_KEY=32
CONFIG_LIBEDHOC_MAX_LEN_OF_MAC=32
CONFIG_LIBEDHOC_MAX_NR_OF_EAD_TOKENS=0
CONFIG_LIBEDHOC_MAX_LEN_OF_CRED_KEY_ID=1
# Working buffers on the (CoAP server) thread stack via C99 VLAs -- no heap.
CONFIG_LIBEDHOC_MEM_BACKEND_STACK=y
# Route libedhoc's diagnostics through Zephyr logging during bring-up.
CONFIG_LIBEDHOC_LOG_LEVEL_WRN=y

# --- OSCORE engine: uoscore-uedhoc (OSCORE only; EDHOC half disabled) ---
# UOSCORE `depends on ZCBOR && ZCBOR_CANONICAL` and `select`s a set of PSA crypto
# primitives (incl. AES-CCM, HMAC, SHA-256; the P-256/ECC selects are unused here).
# CONFIG_UEDHOC is intentionally NOT set -- libedhoc replaces it.
CONFIG_UOSCORE=y
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y

# --- Crypto backend: mbedTLS PSA (already in the manifest) ---
# OSCORE and libedhoc's suite-0 AEAD/HKDF/hash run through the PSA API (heap-
# backed, as in the DTLS variant). X25519 does NOT go through PSA/mbedTLS:
# libedhoc's suite-0 helper does the scalar multiplication with the compact25519
# library (compiled by the app -- see CMakeLists.txt), so there is no mbedTLS
# ECP / bignum / point decompression and none of the "private legacy
# identifiers" plumbing that the suite-2 / P-256 path required.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384

# HKDF is not in uoscore's PSA-common select set, but libedhoc's suite-0 helper
# derives PRK_2e/PRK_out via psa_key_derivation with PSA_ALG_HKDF_EXTRACT /
# _EXPAND (SHA-256), so enable them explicitly.
CONFIG_PSA_WANT_ALG_HKDF_EXTRACT=y
CONFIG_PSA_WANT_ALG_HKDF_EXPAND=y

# --- Stack / buffer sizing ---
# The whole EDHOC handshake runs synchronously on the CoAP server thread
# (edhoc_post drives libedhoc directly -- no dedicated responder thread), and the
# OSCORE encrypt/decrypt runs there too. 8192 covered the heavier suite-2 P-256
# handshake (measured high-water 6296 B via `kernel thread stacks`); X25519 uses
# less, so this keeps ample headroom (re-measure and trim if desired).
CONFIG_COAP_SERVER_STACK_SIZE=8192
# main() only does PSA/USB/net init (the handshake is on the CoAP thread), so the
# default suffices -- same as the DTLS variant, whose main does heavier X.509 work.
CONFIG_MAIN_STACK_SIZE=2048
# One client, strictly sequential, so the base plaintext pool sizes are enough --
# no need for the DTLS variant's larger pools (DTLS fragments records + session state).
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_MAX_CONTEXTS=2

# The CoAP server rejects any inbound datagram larger than MESSAGE_SIZE with
# 4.13 Request Too Large. It defaults to COAP_SERVER_BLOCK_SIZE (64 in prj.conf),
# which is too small for the EDHOC message POSTs (message_1 carries a 32-byte G_X
# plus CoAP header/token/Uri-Path framing, ~65 B). Size it to our message buffer.
CONFIG_COAP_SERVER_MESSAGE_SIZE=256

# --- Logging: keep INFO on (base prj.conf already enables it); compile out for
# latency runs via perf.conf. ---
CONFIG_LOG=y
