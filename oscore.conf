# usb_ncm_net -- EDHOC + OSCORE variant. Layer on top of prj.conf:
#   west build -p always -b zbook/rp2350b/m33 -- -DEXTRA_CONF_FILE=oscore.conf
#   (or: just build-oscore)
#
# Application-layer security over PLAIN CoAP/UDP :5683 (no DTLS):
#   - EDHOC (RFC 9528, method 3 static-DH, suite 2 P-256) establishes keys via
#     POSTs to /.well-known/edhoc (RFC 9668 transport binding).
#   - OSCORE (RFC 8613) protects the hello/led exchange.
# The peer (EDHOC Initiator + OSCORE client) is the host PC -- see
# scripts/edhoc_oscore_client.py.
#
# Split-library design (see docs/edhoc-oscore-plan.md):
#   - EDHOC engine = libedhoc (RFC-9528-final, RFC-9529-ch.3 byte-verified).
#     src/edhoc_oscore.c is compiled in when CONFIG_LIBEDHOC_ENABLE is set.
#   - OSCORE engine = uoscore-uedhoc's OSCORE half (kept; its EDHOC half has two
#     unfixed RFC-9528 encoding bugs and is no longer built -- CONFIG_UEDHOC off).
#
# SSN persistence is NOT enabled: a fresh EDHOC run each boot re-keys OSCORE, so
# the sender sequence number always starts from 0 (no AEAD nonce reuse).

# --- EDHOC engine: libedhoc (native Zephyr module) ---
CONFIG_LIBEDHOC_ENABLE=y
# Tune the compile-time working-set to our single profile (method 3, suite 2,
# one-byte connection ids and kids, no EAD). Smaller than the defaults.
CONFIG_LIBEDHOC_MAX_NR_OF_CIPHER_SUITES=1
CONFIG_LIBEDHOC_MAX_LEN_OF_CONN_ID=1
CONFIG_LIBEDHOC_MAX_LEN_OF_ECC_KEY=32
CONFIG_LIBEDHOC_MAX_LEN_OF_MAC=32
CONFIG_LIBEDHOC_MAX_NR_OF_EAD_TOKENS=0
CONFIG_LIBEDHOC_MAX_LEN_OF_CRED_KEY_ID=1
# Working buffers on the (CoAP server) thread stack via C99 VLAs -- no heap.
CONFIG_LIBEDHOC_MEM_BACKEND_STACK=y
# Route libedhoc's diagnostics through Zephyr logging during bring-up.
CONFIG_LIBEDHOC_LOG_LEVEL_WRN=y

# --- OSCORE engine: uoscore-uedhoc (OSCORE only; EDHOC half disabled) ---
# UOSCORE `depends on ZCBOR && ZCBOR_CANONICAL` and `select`s the PSA crypto
# common primitives (ECDH, P-256, AES-CCM, HMAC, SHA-256). CONFIG_UEDHOC is
# intentionally NOT set -- libedhoc replaces it.
CONFIG_UOSCORE=y
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y

# --- Crypto backend: mbedTLS PSA (already in the manifest) ---
# libedhoc and uoscore both drive mbedTLS through the PSA API; the PSA ECC/AEAD
# operations use the heap (same as the DTLS variant).
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384

# HKDF is not part of uoscore's PSA-common select set, but libedhoc's cipher
# suite 2 helper derives PRK_2e/PRK_out via psa_key_derivation with
# PSA_ALG_HKDF_EXTRACT / _EXPAND (SHA-256), so enable them explicitly.
CONFIG_PSA_WANT_ALG_HKDF_EXTRACT=y
CONFIG_PSA_WANT_ALG_HKDF_EXPAND=y

# libedhoc's cipher-suite-2 helper reconstructs the peer's static-DH point from
# its 32-byte X-coordinate with the classic mbedTLS ECP/bignum API
# (mbedtls_ecp_group_load + mbedtls_mpi_*). In this mbedTLS (tf-psa-crypto 4.x)
# that legacy API is "private"; DECLARE_PRIVATE_IDENTIFIERS is the intended
# transition escape hatch that re-exposes its declarations and generates a
# public <mbedtls/ecp.h>. (The classic PK layer is NOT needed: our vendored
# copy of the helper -- vendor/edhoc_cipher_suite_2.c -- drops the mbedtls_pk_*
# dance that this mbedTLS removed. No X.509 either: creds are CCS/raw pubkeys.)
CONFIG_MBEDTLS_DECLARE_PRIVATE_IDENTIFIERS=y

# --- Stack / buffer head-room ---
# The whole EDHOC handshake now runs synchronously on the CoAP server thread
# (edhoc_post drives libedhoc directly -- no dedicated responder thread), and the
# OSCORE encrypt/decrypt also runs there, so this stack must cover the P-256
# keygen/ECDH + CBOR/CCM temporaries + libedhoc's VLA working buffers. Generous
# for bring-up; trim once CONFIG_THREAD_ANALYZER reports the high-water mark.
CONFIG_COAP_SERVER_STACK_SIZE=12288
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_MAX_CONTEXTS=3

# --- Logging: keep INFO on for EDHOC/OSCORE bring-up (base prj.conf already
# enables it); compile out later for latency runs via perf.conf. ---
CONFIG_LOG=y

# --- Stack-usage instrumentation while tuning stack sizes ---
CONFIG_INIT_STACKS=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_LOG=y
CONFIG_THREAD_NAME=y
