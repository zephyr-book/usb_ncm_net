# usb_ncm_net -- USB CDC-NCM + CoAP server (minimal, IPv4/UDP-only).
#
# This is the base build: plaintext CoAP, single client, trimmed net stack.
# For the DTLS/CoAPS (X.509) variant, layer dtls.conf on top:
#   west build -p always -b zbook/rp2350b/m33 -- -DEXTRA_CONF_FILE=dtls.conf
#   (or: just build-dtls)
#
# After flashing, reset the board so macOS cleanly re-enumerates the USB device.

# --- USB device stack (device_next) + CDC-NCM ethernet class ---
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_NCM_CLASS=y

# --- Net stack: Ethernet L2 (NCM dep) + IPv4 + UDP sockets only ---
# No IPv6, no TCP, no DHCP, no connection manager. The static IPv4 address is set
# directly in main() (net_if_ipv4_addr_add), so there is no net-config layer.
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# --- Minimal packet/buffer/context pools for one CoAP client over UDP ---
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_MAX_CONTEXTS=1

# --- Drop IPv4/net features unused by unicast CoAP ---
CONFIG_NET_IPV4_IGMP=n
CONFIG_NET_IPV4_HDR_OPTIONS=n
CONFIG_NET_CONTEXT_DSCP_ECN=n
CONFIG_NET_ARP_GRATUITOUS=n

# --- GPIO for the "led" resource ---
CONFIG_GPIO=y

# The board dtsi enables a voltage-divider sensor node we don't use; keep the
# driver off so it doesn't require the SENSOR subsystem.
CONFIG_VOLTAGE_DIVIDER=n

# --- CoAP server (own thread, autostarts UDP :5683). Single client. ---
CONFIG_COAP=y
CONFIG_COAP_SERVER=y
CONFIG_COAP_SERVER_WELL_KNOWN_CORE=n
CONFIG_COAP_SERVER_BLOCK_SIZE=64
CONFIG_COAP_SERVICE_OBSERVERS=0
CONFIG_COAP_SERVICE_PENDING_MESSAGES=1
CONFIG_COAP_SERVER_STACK_SIZE=2048

# --- RP2350 HW RNG for CoAP randomness (see sections-rwdata.ld in CMakeLists.txt) ---
CONFIG_ENTROPY_GENERATOR=y

# --- Bare console on UART0, no net / coap_server shells. ---
# Logging is OFF: LOG_* calls (e.g. per-request handler logs) do synchronous UART
# work that perturbs transmission and inflates the CoAP latency measurement, so
# CONFIG_LOG=n compiles them all out. Re-enable for debugging only.
CONFIG_SHELL=y
CONFIG_NET_SHELL=n
CONFIG_COAP_SERVER_SHELL=n
CONFIG_LOG=n

CONFIG_MAIN_STACK_SIZE=2048
