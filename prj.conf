# usb_ncm_net -- development baseline (debuggable: shell + logging on the console).
#
# For a stripped, production-minimal build, layer the minimal profile on top:
#   west build -p always -b zbook/rp2350b/m33 -- -DEXTRA_CONF_FILE=minimal.conf
#
# After flashing, reset the board so macOS cleanly re-enumerates the USB device.

# --- USB device stack (device_next) + CDC-NCM ethernet class ---
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_NCM_CLASS=y

# --- Net stack: Ethernet L2 (NCM dependency) + IPv4 + UDP sockets, nothing else.
# No IPv6, no TCP, no DHCP, no connection manager. The static IPv4 address is set
# directly in main() (net_if_ipv4_addr_add), so there is no net-config layer.
# NET_MGMT is pulled in unconditionally by the Ethernet L2 (unavoidable with NCM)
# but is otherwise unused. ---
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# --- GPIO for the "led" resource ---
CONFIG_GPIO=y

# --- CoAP server (own RX/TX thread, autostarts UDP :5683) ---
CONFIG_COAP=y
CONFIG_COAP_SERVER=y

# --- RP2350 HW RNG for CoAP randomness (see sections-rwdata.ld in CMakeLists.txt) ---
CONFIG_ENTROPY_GENERATOR=y

# --- Diagnostics (dev build): shell + logging on the console (uart0) ---
CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_COAP_SERVER_SHELL=y
CONFIG_LOG=y
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y

CONFIG_MAIN_STACK_SIZE=2048
