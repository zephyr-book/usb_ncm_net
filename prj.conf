# USB-NCM CoAP server.
#
# Build (USB device controller is enabled by app.overlay):
#   west build -p always -b zbook/rp2350b/m33
# Then flash over SWD as usual (just flash / west flash).

# --- USB device stack (device_next) + CDC-NCM ethernet class ---
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_NCM_CLASS=y

# --- Net stack: Ethernet L2 (NCM dependency) + IPv4 + UDP sockets (POSIX) ---
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y

# --- Static IPv4 on the NCM interface (the macOS host is configured by hand) ---
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# --- CoAP server: its own RX/TX thread, autostarts UDP :5683 ---
CONFIG_COAP=y
CONFIG_COAP_SERVER=y
CONFIG_COAP_SERVER_WELL_KNOWN_CORE=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=40

# CoAP needs randomness (message IDs / ACK timeout jitter). The board enables the
# RP2350 hardware RNG (&rng), so the entropy driver supplies it.
CONFIG_ENTROPY_GENERATOR=y

# --- Net buffers / contexts ---
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_MAX_CONTEXTS=10

# --- Diagnostics: net + coap shell + logging on the console (uart0) ---
CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_COAP_SERVER_SHELL=y
CONFIG_NET_STATISTICS=y
CONFIG_LOG=y
CONFIG_NET_LOG=y
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y

CONFIG_ASSERT=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
