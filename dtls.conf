# usb_ncm_net -- DTLS / CoAPS (PSK) variant. Layer on top of prj.conf:
#   west build -p always -b zbook/rp2350b/m33 \
#       -- -DEXTRA_CONF_FILE=dtls.conf -DMBEDTLS_FATAL_WARNINGS=OFF
#   (or: just build-dtls)
#
# Turns the plaintext CoAP server (UDP :5683) into a CoAPS server (DTLS 1.2 over
# UDP :5684) authenticated with a pre-shared key (TLS_PSK_WITH_AES_128_CCM_8 --
# CoAP's RFC 7252 mandatory-to-implement mode). PSK is far smaller and faster than
# X.509: no certificate parsing, no ECDSA/ECDHE, symmetric-only handshake.
# src/coap_server.c switches to COAPS_SERVICE_DEFINE and registers the PSK when
# CONFIG_NET_SOCKETS_ENABLE_DTLS is set.

# --- Secure sockets / DTLS ---
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2
CONFIG_NET_SOCKETS_DTLS_TIMEOUT=30000

# --- mbedTLS, PSK-only ---
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=1024

# TLS_PSK_WITH_AES_128_CCM_8: no convenience ciphersuite symbol exists for CCM-8,
# so select the same deps the PSK-GCM ciphersuite does, with CCM instead of GCM.
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
CONFIG_MBEDTLS_KEY_EXCHANGE_PSK_ENABLED=y
CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_ALG_TLS12_PRF=y
CONFIG_PSA_WANT_ALG_TLS12_PSK_TO_MS=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_KEY_TYPE_DERIVE=y

# --- Modest pool/stack bumps for DTLS records + handshake (PSK is light) ---
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_MAX_CONTEXTS=3
CONFIG_COAP_SERVER_STACK_SIZE=4096
