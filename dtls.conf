# usb_ncm_net -- DTLS / CoAPS (X.509) variant. Layer on top of prj.conf:
#   west build -p always -b zbook/rp2350b/m33 -- -DEXTRA_CONF_FILE=dtls.conf
#   (or: just build-dtls)
#
# Turns the plaintext CoAP server (UDP :5683) into a CoAPS server (DTLS 1.2 over
# UDP :5684) authenticated with a self-signed EC P-256 server certificate
# (certs/coaps-server-*.der). Uses Zephyr's default mbedTLS config, which
# provides X.509 + ECDHE-ECDSA. src/coap_server.c switches to COAPS_SERVICE_DEFINE
# and registers the credentials when CONFIG_NET_SOCKETS_ENABLE_DTLS is set.

# --- Secure sockets / DTLS ---
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2
CONFIG_NET_SOCKETS_DTLS_TIMEOUT=30000

# --- mbedTLS (default config: X.509 + ECDHE-ECDSA among others) ---
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=60000
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=2048
# DTLS 1.2 (DTLS is selected by NET_SOCKETS_ENABLE_DTLS but needs TLS 1.2 on).
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
# Certificate ciphersuite -- this convenience symbol pulls in the hash (SHA-256),
# key exchange (ECDHE-ECDSA), cipher (AES-128-GCM), curve (P-256) and X.509.
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256=y

# --- Bigger pools/stacks: DTLS records are larger than plaintext CoAP, and the
#     handshake (cert + ECDHE) is stack-heavy on the CoAP server thread. ---
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=3
CONFIG_COAP_SERVER_STACK_SIZE=6144
CONFIG_MAIN_STACK_SIZE=4096
