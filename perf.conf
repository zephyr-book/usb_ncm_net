# usb_ncm_net -- performance-measurement overlay.
#
# Layer on top of prj.conf (and optionally dtls.conf) for CoAP latency/throughput
# runs with scripts/coap_latency.py:
#   west build -p always -b zbook/rp2350b/m33 -d build-perf \
#         -- -DEXTRA_CONF_FILE=perf.conf                              # plaintext
#   west build -p always -b zbook/rp2350b/m33 -d build-dtls-perf \
#         -- -DEXTRA_CONF_FILE="dtls.conf;perf.conf" -DMBEDTLS_FATAL_WARNINGS=OFF
#   (or: just build-perf / just build-dtls-perf)
#
# The shell and the logging subsystem both do synchronous UART I/O that perturbs
# transmission and inflates the measured round-trip latency, so both are compiled
# out here. Everything else (net stack, CoAP server, resources) is unchanged.
CONFIG_SHELL=n
CONFIG_LOG=n
