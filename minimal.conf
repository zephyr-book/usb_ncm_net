# usb_ncm_net -- minimal NETWORKING-STACK profile.
#
# Layer on top of prj.conf:
#   west build -p always -b zbook/rp2350b/m33 -d build-min -- -DEXTRA_CONF_FILE=minimal.conf
#   (or: just build-min)
#
# This trims ONLY the networking stack (packet/buffer pools, network contexts,
# CoAP parameters) so its footprint can be compared against prj.conf with
# everything else -- shell, logging, diagnostics, stacks -- held identical.
# Assumes a single CoAP client over UDP (no concurrent consumers).

# --- Packet/buffer pools sized for one small CoAP flow ---
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

# --- One UDP socket (the CoAP server) -> one network context ---
CONFIG_NET_MAX_CONTEXTS=1

# --- CoAP: one client, no observe, no .well-known/core discovery, tiny payloads ---
CONFIG_COAP_SERVER_WELL_KNOWN_CORE=n
CONFIG_COAP_SERVER_BLOCK_SIZE=64
CONFIG_COAP_SERVICE_OBSERVERS=0
CONFIG_COAP_SERVICE_PENDING_MESSAGES=1
CONFIG_COAP_SERVER_STACK_SIZE=2048
